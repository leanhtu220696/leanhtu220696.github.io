<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Chinh - TikTok Solid Heart & Clean Text</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #030008; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        #video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        .glass-panel {
            background: rgba(12, 3, 20, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 20, 147, 0.25);
            border-radius: 16px;
            box-shadow: 0 0 35px rgba(255, 20, 147, 0.2);
        }
        .btn-hint {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .btn-hint:hover {
            background: rgba(255, 20, 147, 0.2);
            border-color: rgba(255, 20, 147, 0.5);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
            color: #ff1493 !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <video id="video" playsinline></video>
    
    <div id="loader-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black transition-opacity duration-700">
        <div class="w-12 h-12 border-4 border-pink-500/20 border-l-pink-500 rounded-full animate-spin mb-4"></div>
        <div class="text-pink-500 text-xl font-bold tracking-widest uppercase animate-pulse">Đang đồng bộ ma trận hạt...</div>
    </div>

    <div class="absolute top-0 left-0 w-full h-full pointer-events-none z-10 p-6 flex flex-col justify-between">
        <div class="glass-panel p-4 w-72 pointer-events-auto">
            <h1 class="text-pink-500 text-xl font-bold mb-1 tracking-wider">PREMIUM ENGINE v7.0</h1>
            <div class="flex items-center gap-2 bg-black/40 rounded-full px-3 py-1 w-fit border border-pink-500/10 mb-4">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500 animate-ping"></div>
                <span id="status-text" class="text-[10px] text-gray-300 font-mono uppercase tracking-wider">Đang chờ cử chỉ tay...</span>
            </div>
            
            <div class="text-[12px] text-pink-200/70 font-mono space-y-2 border-t border-pink-500/10 pt-3">
                <button id="hint-burst" class="btn-hint w-full text-left p-2 rounded-lg opacity-50 flex items-center gap-2">
                    <span>👋</span> <span><b>Xòe 5 ngón:</b> Siêu bùng nổ vũ trụ</span>
                </button>
                
                <button id="hint-heart" class="btn-hint w-full text-left p-2 rounded-lg opacity-50 flex items-center gap-2">
                    <span>☝️</span> <span><b>1 ngón trỏ:</b> Trái tim đặc chuẩn TikTok</span>
                </button>
                
                <button id="hint-text" class="btn-hint w-full text-left p-2 rounded-lg opacity-50 flex items-center gap-2">
                    <span>✌️</span> <span><b>2 ngón tay:</b> Chữ nét mảnh thanh tú</span>
                </button>

                <button id="btn-reset" class="btn-hint w-full text-left p-2 rounded-lg opacity-50 flex items-center gap-2 text-gray-400">
                    <span>🔄</span> <span><b>Bỏ chọn:</b> Trở lại thiên hà cầu</span>
                </button>
            </div>
        </div>
        
        <div class="w-full flex justify-center pb-6">
            <div id="action-display" class="text-pink-500 font-bold tracking-widest text-2xl uppercase transition-all duration-300 drop-shadow-[0_0_20px_rgba(255,20,147,0.8)]"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const CONFIG = {
            PARTICLE_COUNT: 75000, // Tăng nhẹ số lượng hạt để trái tim đặc mịn hơn nữa
            PARTICLE_SIZE: 0.12,   
            COLOR_PINK: 0xff1493,  
            VIDEO_WIDTH: 640,
            VIDEO_HEIGHT: 480
        };

        let scene, camera, renderer, composer, controls;
        let particles = null;
        let video, hands;
        
        let isManualMode = false; 
        let currentMode = "sphere";
        let activeTween = null;

        let spherePositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);
        let heartPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);
        let textPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);
        let explosionPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030008, 0.01);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 28);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.2, 0.4, 0.85);
            bloomPass.threshold = 0.0;
            bloomPass.strength = 2.0; 
            bloomPass.radius = 0.5;
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4; 

            precalculateShapes();
            createParticleSystem();
            setupClickEvents(); 

            await initCamera().catch(() => {
                document.getElementById('status-text').innerText = "CLICK MODE CHỦ ĐỘNG";
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-yellow-500";
            });
            
            initHandDetector();
            window.addEventListener('resize', onWindowResize);
            
            document.getElementById('loader-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loader-overlay').remove(), 700);

            animate();
        }

        // Khởi tạo các nét chữ mảnh chính xác (Stroke segments) thay vì dạng khối hộp
        function getFontSegments() {
            return {
                'L': [[0,4, 0,0], [0,0, 2,0]],
                'A': [[0,0, 1,4], [1,4, 2,0], [0.3,1.5, 1.7,1.5]],
                'M': [[0,0, 0,4], [0,4, 1,2], [1,2, 2,4], [2,4, 2,0]],
                
                'N': [[0,0, 0,4], [0,4, 2,0], [2,0, 2,4]],
                'G': [[2,3.5, 1,4], [1,4, 0,2], [0,2, 1,0], [1,0, 2,0.5], [2,0.5, 2,2], [2,2, 1.2,2]],
                'U': [[0,4, 0,0.8], [0,0.8, 1,0], [1,0, 2,0.8], [2,0.8, 2,4]],
                'O': [[0,0.8, 0,3.2], [0,3.2, 1,4], [1,4, 2,3.2], [2,3.2, 2,0.8], [2,0.8, 1,0], [1,0, 0,0.8]],
                'I': [[0,4, 2,4], [1,4, 1,0], [0,0, 2,0]],
                
                'H': [[0,0, 0,4], [2,0, 2,4], [0,2, 2,2]],
                'E': [[2,4, 0,4], [0,4, 0,0], [0,0, 2,0], [0,2, 1.5,2]],
                
                'C': [[2,3.5, 1,4], [1,4, 0,2], [0,2, 1,0], [1,0, 2,0.5]],
                'Y': [[0,4, 1,2], [2,4, 1,2], [1,2, 1,0]],
            };
        }

        function precalculateShapes() {
            // Định nghĩa chuỗi ký tự theo dòng
            const linesData = [
                { text: "LAM NGUOI YEU", yOffset: 2.5, scale: 1.0 },
                { text: "ANH NHE CHINH", yOffset: -2.5, scale: 1.0 }
            ];

            const fontDefs = getFontSegments();

            // Tổng hợp toàn bộ các phân đoạn (segments) vẽ chữ để phân phối hạt đồng đều
            let allSegments = [];
            linesData.forEach(lineObj => {
                let currentX = - (lineObj.text.length * 2.5) / 2; // Căn giữa dòng chữ
                
                for (let char of lineObj.text) {
                    if (char === ' ') {
                        currentX += 2.2;
                        continue;
                    }
                    const segs = fontDefs[char];
                    if (segs) {
                        segs.forEach(s => {
                            allSegments.push({
                                x1: currentX + s[0] * lineObj.scale,
                                y1: lineObj.yOffset + s[1] * lineObj.scale,
                                x2: currentX + s[2] * lineObj.scale,
                                y2: lineObj.yOffset + s[3] * lineObj.scale
                            });
                        });
                    }
                    currentX += 2.6; // Khoảng cách giữa các chữ
                }
            });

            for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                // A. Hình cầu gốc
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                const r = 10 + Math.random() * 2;
                spherePositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                spherePositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                spherePositions[i*3+2] = r * Math.cos(phi);

                // B. THUẬT TOÁN TRÁI TIM ĐẶC CHUẨN TIKTOK (Xử lý từ ảnh số 1)
                // Phân bổ hạt ngẫu nhiên phủ kín toàn bộ bề măt diện tích bên trong lòng trái tim
                const t = Math.PI - 2 * Math.PI * Math.random();
                // Dùng toán học lũy thừa r (căn bậc của random) để hạt nén dầy và rải đều từ tâm ra rìa
                const rFactor = Math.sqrt(Math.random()); 

                let hx = 16 * Math.pow(Math.sin(t), 3);
                let hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

                const heartScale = 0.75;
                // Nhân thêm rFactor giúp hạt phân bố kín lòng đặc chứ không bị rỗng ở giữa
                heartPositions[i*3]     = (hx * heartScale) * rFactor + (Math.random() - 0.5) * 0.4;
                heartPositions[i*3+1]   = (hy * heartScale - 1.0) * rFactor + (Math.random() - 0.5) * 0.4;
                // Thêm độ dầy z nhẹ tạo cảm giác khối 3D phồng sang trọng
                heartPositions[i*3+2]   = (Math.random() - 0.5) * 2.5 * (1.0 - rFactor * 0.5);

                // C. THUẬT TOÁN CHỮ NÉT MẢNH THANH TÚ (Xử lý từ ảnh số 3)
                if (allSegments.length > 0) {
                    // Chọn ngẫu nhiên một phân đoạn nét vẽ chữ
                    const seg = allSegments[Math.floor(Math.random() * allSegments.length)];
                    const ratio = Math.random(); // Điểm bất kỳ trên nét vẽ đó
                    
                    // Nội suy vị trí hạt bám chặt dọc đường xương chữ
                    textPositions[i*3]     = seg.x1 + (seg.x2 - seg.x1) * ratio + (Math.random() - 0.5) * 0.12;
                    textPositions[i*3+1]   = seg.y1 + (seg.y2 - seg.y1) * ratio + (Math.random() - 0.5) * 0.12;
                    textPositions[i*3+2]   = (Math.random() - 0.5) * 0.3; // Giữ độ dày phẳng để nhìn trực diện cực kỳ rõ chữ
                } else {
                    textPositions[i*3]     = (Math.random() - 0.5) * 10;
                    textPositions[i*3+1]   = (Math.random() - 0.5) * 5;
                    textPositions[i*3+2]   = 0;
                }

                // D. Mảng siêu bùng nổ văng xa
                explosionPositions[i*3] = spherePositions[i*3] * 3.0;
                explosionPositions[i*3+1] = spherePositions[i*3+1] * 3.0;
                explosionPositions[i*3+2] = spherePositions[i*3+2] * 3.0;
            }
        }

        function createParticleSystem() {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(spherePositions), 3));

            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8,8,0, 8,8,8);
            grad.addColorStop(0, 'rgba(255,255,255,1)');       
            grad.addColorStop(0.2, 'rgba(255,20,147,0.85)');   
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,16,16);
            const texture = new THREE.CanvasTexture(canvas);

            const material = new THREE.PointsMaterial({
                size: CONFIG.PARTICLE_SIZE,
                map: texture,
                color: new THREE.Color(CONFIG.COLOR_PINK),
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        // Điều khiển chuyển động bằng GSAP mượt mà tinh tế đúng chuẩn
        function morph(targetPositionsArray, durationTime = 2.5) {
            if (activeTween) activeTween.kill();

            const posAttribute = particles.geometry.attributes.position;
            
            activeTween = gsap.to(posAttribute.array, {
                endArray: targetPositionsArray,
                duration: durationTime,
                ease: "power2.inOut",
                onUpdate: () => {
                    posAttribute.needsUpdate = true;
                }
            });
        }

        async function initCamera() {
            video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: CONFIG.VIDEO_WIDTH, height: CONFIG.VIDEO_HEIGHT }
            });
            video.srcObject = stream;
            return new Promise(resolve => {
                video.onloadedmetadata = () => { video.play(); resolve(); };
            });
        }

        function initHandDetector() {
            try {
                hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                hands.onResults(onHandResults);

                const cameraUtils = new Camera(video, {
                    onFrame: async () => { await hands.send({ image: video }); },
                    width: CONFIG.VIDEO_WIDTH, height: CONFIG.VIDEO_HEIGHT
                });
                cameraUtils.start();
            } catch(e) { console.log("MediaPipe bypass"); }
        }

        function setupClickEvents() {
            const hBurst = document.getElementById('hint-burst');
            const hHeart = document.getElementById('hint-heart');
            const hText = document.getElementById('hint-text');
            const btnReset = document.getElementById('btn-reset');
            const actionDisplay = document.getElementById('action-display');

            hBurst.addEventListener('click', () => {
                isManualMode = true; currentMode = "burst";
                actionDisplay.innerText = "💥 SUPERNOVA BURST! 💥";
                highlightHint(hBurst); morph(explosionPositions, 1.8);
            });

            hHeart.addEventListener('click', () => {
                isManualMode = true; currentMode = "heart";
                actionDisplay.innerText = "💖 SOLID HEART FOR CHINH 💖";
                highlightHint(hHeart); morph(heartPositions, 2.6);
            });

            hText.addEventListener('click', () => {
                isManualMode = true; currentMode = "text";
                actionDisplay.innerText = "✨ LÀM NGƯỜI YÊU ANH NHÉ CHINH ✨";
                highlightHint(hText); morph(textPositions, 2.6);
            });

            btnReset.addEventListener('click', () => {
                isManualMode = false; currentMode = "sphere";
                actionDisplay.innerText = ""; resetHints(); morph(spherePositions, 2.0);
            });
        }

        function onHandResults(results) {
            if (isManualMode) return; 

            const actionDisplay = document.getElementById('action-display');
            const hBurst = document.getElementById('hint-burst');
            const hHeart = document.getElementById('hint-heart');
            const hText = document.getElementById('hint-text');

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-red-500 animate-ping";
                document.getElementById('status-text').innerText = "Đang chờ bàn tay...";
                if (currentMode !== "sphere") {
                    currentMode = "sphere"; actionDisplay.innerText = ""; resetHints();
                    morph(spherePositions, 2.0); 
                }
                return;
            }

            document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-green-500";
            document.getElementById('status-text').innerText = "Đã khóa mục tiêu tay";

            const landmarks = results.multiHandLandmarks[0];
            const isFingerOpen = (tipIdx, pipIdx) => landmarks[tipIdx].y < landmarks[pipIdx].y;

            const indexOpen  = isFingerOpen(8, 6);
            const middleOpen = isFingerOpen(12, 10);
            const ringOpen   = isFingerOpen(16, 14);
            const pinkyOpen  = isFingerOpen(20, 18);
            
            let openedFingersCount = 0;
            if (indexOpen) openedFingersCount++;
            if (middleOpen) openedFingersCount++;
            if (ringOpen) openedFingersCount++;
            if (pinkyOpen) openedFingersCount++;

            if (openedFingersCount >= 3 && currentMode !== "burst") {
                currentMode = "burst"; actionDisplay.innerText = "💥 SUPERNOVA BURST! 💥";
                highlightHint(hBurst); morph(explosionPositions, 1.8);
            } 
            else if (indexOpen && !middleOpen && !ringOpen && !pinkyOpen && currentMode !== "heart") {
                currentMode = "heart"; actionDisplay.innerText = "💖 SOLID HEART FOR CHINH 💖";
                highlightHint(hHeart); morph(heartPositions, 2.6);
            } 
            else if (indexOpen && middleOpen && !ringOpen && !pinkyOpen && currentMode !== "text") {
                currentMode = "text"; actionDisplay.innerText = "✨ LÀM NGƯỜI YÊU ANH NHÉ CHINH ✨";
                highlightHint(hText); morph(textPositions, 2.6);
            }
        }

        function highlightHint(element) {
            resetHints();
            element.style.opacity = "1";
            element.style.color = "#ff1493";
            element.style.background = "rgba(255, 20, 147, 0.15)";
            element.style.borderColor = "rgba(255, 20, 147, 0.4)";
        }

        function resetHints() {
            ['hint-burst', 'hint-heart', 'hint-text'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.style.opacity = "0.5"; el.style.color = "white";
                    el.style.background = "transparent"; el.style.borderColor = "transparent";
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const posAttr = particles.geometry.attributes.position;
            const posArray = posAttr.array;
            const time = Date.now() * 0.002;

            // Hiệu ứng dập dềnh hữu cơ nhẹ nhàng cho toàn bộ hệ thống hạt khi đứng yên
            for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                const idx = i * 3;
                posArray[idx]   += Math.sin(time + i * 0.1) * 0.006;
                posArray[idx+1] += Math.cos(time + i * 0.1) * 0.006;
            }
            posAttr.needsUpdate = true;

            composer.render();
        }

        window.onload = init;
    </script>
</body>
</html>
