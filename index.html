<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Chinh - Advanced Hand Tracking & Voice 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #030008; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        #video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        .glass-panel {
            background: rgba(12, 3, 20, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 20, 147, 0.25);
            border-radius: 16px;
            box-shadow: 0 0 35px rgba(255, 20, 147, 0.2);
        }
        .btn-hint {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .btn-hint:hover {
            background: rgba(255, 20, 147, 0.2);
            border-color: rgba(255, 20, 147, 0.5);
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
            color: #ff1493 !important;
            opacity: 1 !important;
        }

        /* Giao diện ảnh đôi lãng mạn */
        #couple-interface {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #couple-interface.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        @media (max-width: 767px) and (orientation: portrait) {
            #canvas-container {
                width: 100vh !important;
                height: 100vw !important;
                transform: rotate(90deg);
                transform-origin: top left;
                top: 0;
                left: 100vw;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <video id="video" playsinline></video>
    
    <div id="loader-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black transition-opacity duration-700">
        <div class="w-12 h-12 border-4 border-pink-500/20 border-l-pink-500 rounded-full animate-spin mb-4"></div>
        <div id="loader-text" class="text-pink-500 text-xl font-bold tracking-widest uppercase text-center px-4">Đang khởi tạo không gian 3D...</div>
    </div>

    <div id="couple-interface" class="flex items-center justify-center gap-8 md:gap-16">
        <div class="relative w-32 h-32 md:w-48 md:h-48 rounded-full border-4 border-pink-500 shadow-[0_0_30px_rgba(255,20,147,0.6)] overflow-hidden animate-pulse">
            <img src="anh_toi.jpg" alt="Anh" class="w-full h-full object-cover">
        </div>
        
        <div class="text-5xl md:text-6xl animate-bounce drop-shadow-[0_0_15px_rgba(255,20,147,0.8)]">❤️</div>
        
        <div class="relative w-32 h-32 md:w-48 md:h-48 rounded-full border-4 border-pink-500 shadow-[0_0_30px_rgba(255,20,147,0.6)] overflow-hidden animate-pulse" style="animation-delay: 0.5s;">
            <img src="co_ay.jpg" alt="Cô Ấy" class="w-full h-full object-cover">
        </div>
    </div>

    <div class="absolute top-6 left-6 z-10 w-80 pointer-events-auto">
        <div class="glass-panel p-5">
            <h1 class="text-pink-500 text-xl font-bold mb-2 tracking-wider">COUPLE CORE v12.1</h1>
            
            <div class="flex flex-col gap-2 mb-4">
                <div class="flex items-center gap-2 bg-black/40 rounded-full px-3 py-1 w-full border border-pink-500/10">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></div>
                    <span id="status-text" class="text-[11px] text-gray-300 font-mono uppercase tracking-wider">Đang chờ camera...</span>
                </div>
                <div class="flex items-center gap-2 bg-black/40 rounded-full px-3 py-1 w-full border border-pink-500/10">
                    <div id="voice-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></div>
                    <span id="voice-text" class="text-[11px] text-pink-300 font-mono tracking-wider">🎤 Đang khởi động Microphone...</span>
                </div>
            </div>
            
            <div class="text-[12px] text-pink-200/70 font-mono space-y-2 border-t border-pink-500/10 pt-3">
                <button id="hint-heart" class="btn-hint w-full text-left p-2 rounded-lg opacity-50 flex items-center gap-2">
                    <span>❤️</span> <span><b>Nắm tay:</b> Khối hình Trái tim</span>
                </button>
                <button id="hint-burst" class="btn-hint w-full text-left p-2 rounded-lg opacity-50 flex items-center gap-2">
                    <span>👋</span> <span><b>Xòe tay:</b> Siêu bùng nổ vũ trụ</span>
                </button>
                <button id="hint-text" class="btn-hint w-full text-left p-2 rounded-lg opacity-50 flex items-center gap-2">
                    <span>💬</span> <span><b>Nói "Đồng ý":</b> Hiện mật mã chữ + Ảnh</span>
                </button>
            </div>

            <div id="debug-log" class="mt-3 text-[10px] bg-black/60 p-2 rounded text-gray-400 font-mono max-h-16 overflow-y-auto border border-white/5">
                Hệ thống: Sẵn sàng thiết lập.
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;

        const CONFIG = {
            PARTICLE_COUNT: isMobile ? 35000 : 75000, 
            PARTICLE_SIZE: isMobile ? 0.14 : 0.12,   
            COLOR_PINK: 0xff1493,  
            VIDEO_WIDTH: isMobile ? 320 : 640,       
            VIDEO_HEIGHT: isMobile ? 240 : 480,
            DEFAULT_ROTATE_SPEED: 0.5
        };

        let scene, camera, renderer, composer, controls;
        let particles = null;
        let video, hands;
        
        let isActivated = false; 
        let currentMode = "heart"; 
        let activeTween = null;

        let heartPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);
        let textPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);
        let explosionPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);

        function printLog(msg) {
            const logger = document.getElementById('debug-log');
            if (logger) {
                logger.innerText = "Log: " + msg;
            }
        }

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030008, 0.01);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 28); 

            renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight), 
                isMobile ? 1.4 : 2.2, 
                0.4, 
                0.85
            );
            bloomPass.threshold = 0.0;
            bloomPass.strength = isMobile ? 1.2 : 2.0; 
            bloomPass.radius = 0.5;
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = CONFIG.DEFAULT_ROTATE_SPEED;

            controls.minPolarAngle = Math.PI / 4; 
            controls.maxPolarAngle = Math.PI * 3 / 4;

            precalculateShapes();
            createParticleSystem();
            setupClickEvents(); 

            document.getElementById('loader-text').innerText = "Đang xin quyền truy cập thiết bị...";

            await initCamera().catch((err) => {
                printLog("Không mở được cam: " + err.message);
                const statusText = document.getElementById('status-text');
                if(statusText) statusText.innerText = "CAMERA TRỰC QUAN KHÓA";
            });
            
            initHandDetector();
            initVoiceRecognition(); 
            window.addEventListener('resize', onWindowResize);
            
            const loader = document.getElementById('loader-overlay');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 700);
            }

            animate();
        }

        function getFontSegments() {
            return {
                'L': [[0,4, 0,0], [0,0, 2,0]],
                'A': [[0,0, 1,4], [1,4, 2,0], [0.3,1.5, 1.7,1.5]],
                'M': [[0,0, 0,4], [0,4, 1,2], [1,2, 2,4], [2,4, 2,0]],
                'N': [[0,0, 0,4], [0,4, 2,0], [2,0, 2,4]],
                'G': [[2,3.5, 1,4], [1,4, 0,2], [0,2, 1,0], [1,0, 2,0.5], [2,0.5, 2,2], [2,2, 1.2,2]],
                'U': [[0,4, 0,0.8], [0,0.8, 1,0], [1,0, 2,0.8], [2,0.8, 2,4]],
                'O': [[0,0.8, 0,3.2], [0,3.2, 1,4], [1,4, 2,3.2], [2,3.2, 2,0.8], [2,0.8, 1,0], [1,0, 0,0.8]],
                'I': [[0,4, 2,4], [1,4, 1,0], [0,0, 2,0]],
                'H': [[0,0, 0,4], [2,0, 2,4], [0,2, 2,2]],
                'E': [[2,4, 0,4], [0,4, 0,0], [0,0, 2,0], [0,2, 1.5,2]],
                'C': [[2,3.5, 1,4], [1,4, 0,2], [0,2, 1,0], [1,0, 2,0.5]],
                'Y': [[0,4, 1,2], [2,4, 1,2], [1,2, 1,0]],
            };
        }

        function precalculateShapes() {
            const linesData = [
                { text: "LAM NGUOI YEU", yOffset: 4.5, scale: 1.0 },
                { text: "ANH NHE CHINH", yOffset: -5.5, scale: 1.0 }
            ];

            const fontDefs = getFontSegments();
            let allSegments = [];
            linesData.forEach(lineObj => {
                let currentX = - (lineObj.text.length * 2.5) / 2;
                for (let char of lineObj.text) {
                    if (char === ' ') { currentX += 2.2; continue; }
                    const segs = fontDefs[char];
                    if (segs) {
                        segs.forEach(s => {
                            allSegments.push({
                                x1: currentX + s[0] * lineObj.scale, y1: lineObj.yOffset + s[1] * lineObj.scale,
                                x2: currentX + s[2] * lineObj.scale, y2: lineObj.yOffset + s[3] * lineObj.scale
                            });
                        });
                    }
                    currentX += 2.6;
                }
            });

            for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                const t = Math.PI - 2 * Math.PI * Math.random();
                const rFactor = Math.sqrt(Math.random()); 
                let hx = 16 * Math.pow(Math.sin(t), 3);
                let hy = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

                const heartScale = 0.78;
                heartPositions[i*3]     = (hx * heartScale) * rFactor + (Math.random() - 0.5) * 0.4;
                heartPositions[i*3+1]   = (hy * heartScale - 1.0) * rFactor + (Math.random() - 0.5) * 0.4;
                heartPositions[i*3+2]   = (Math.random() - 0.5) * 2.5 * (1.0 - rFactor * 0.5);

                if (allSegments.length > 0) {
                    const seg = allSegments[Math.floor(Math.random() * allSegments.length)];
                    const ratio = Math.random();
                    textPositions[i*3]     = seg.x1 + (seg.x2 - seg.x1) * ratio + (Math.random() - 0.5) * 0.15;
                    textPositions[i*3+1]   = seg.y1 + (seg.y2 - seg.y1) * ratio + (Math.random() - 0.5) * 0.15;
                    textPositions[i*3+2]   = (Math.random() - 0.5) * 0.5;
                }

                explosionPositions[i*3] = heartPositions[i*3] * 3.5;
                explosionPositions[i*3+1] = heartPositions[i*3+1] * 3.5;
                explosionPositions[i*3+2] = heartPositions[i*3+2] * 3.5;
            }
        }

        function createParticleSystem() {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(heartPositions), 3));

            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8,8,0, 8,8,8);
            grad.addColorStop(0, 'rgba(255,255,255,1)');       
            grad.addColorStop(0.2, 'rgba(255,20,147,0.85)');   
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,16,16);
            const texture = new THREE.CanvasTexture(canvas);

            const material = new THREE.PointsMaterial({
                size: CONFIG.PARTICLE_SIZE, map: texture, color: new THREE.Color(CONFIG.COLOR_PINK),
                transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function morph(targetPositionsArray, durationTime = 2.0) {
            if (activeTween) activeTween.kill();
            const posAttribute = particles.geometry.attributes.position;
            activeTween = gsap.to(posAttribute.array, {
                endArray: targetPositionsArray, duration: durationTime, ease: "power2.inOut",
                onUpdate: () => { posAttribute.needsUpdate = true; }
            });
        }

        function resetHints() {
            ['hint-burst', 'hint-heart', 'hint-text'].forEach(id => {
                const el = document.getElementById(id);
                if(el) { 
                    el.style.opacity = "0.5"; 
                }
            });
        }

        function highlightHint(id) {
            resetHints();
            const el = document.getElementById(id);
            if(el) el.style.opacity = "1";
        }

        // --- HÀM LẮNG NGHE GIỌNG NÓI CHUẨN XÁC ---
        function initVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const voiceText = document.getElementById('voice-text');
            const voiceDot = document.getElementById('voice-dot');

            if (!SpeechRecognition) {
                if (voiceText) voiceText.innerText = "🎤 Trình duyệt chặn/không hỗ trợ Mic";
                printLog("Trình duyệt không hỗ trợ Web Speech API.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'vi-VN'; 

            recognition.onstart = () => {
                if (voiceText) voiceText.innerText = "🎤 Đang chờ nói 'Em đồng ý'...";
                if (voiceDot) voiceDot.className = "w-2.5 h-2.5 rounded-full bg-pink-500 animate-pulse";
                printLog("Microphone hoạt động, đang lắng nghe...");
            };

            recognition.onerror = (e) => {
                printLog("Lỗi Mic: " + e.error);
            };

            recognition.onresult = (event) => {
                const resultIndex = event.resultIndex;
                const transcript = event.results[resultIndex][0].transcript.toLowerCase().trim();
                printLog("Nghe thấy âm thanh: " + transcript);

                // KIỂM TRA CHẶN CHẶT CHẼ: Phải chứa từ khóa mới mở giao diện
                if (transcript.includes("đồng ý") || transcript.includes("dong y")) {
                    triggerEngagementEffect();
                }
            };

            recognition.onend = () => {
                // Tự động bật lại mic nếu trang chưa được kích hoạt thành công
                if (!isActivated) {
                    try { recognition.start(); } catch(err) {}
                }
            };

            try { recognition.start(); } catch(e) {}
        }

        // HÀM KÍCH HOẠT DUY NHẤT: CHỈ CHẠY KHI NGHE GIỌNG NÓI HOẶC CLICK THỦ CÔNG
        function triggerEngagementEffect() {
            if (isActivated) return;
            isActivated = true; 
            
            // 1. Chuyển đổi hạt thành Chữ Tỏ Tình vĩnh viễn
            currentMode = "text";
            highlightHint('hint-text');
            morph(textPositions, 2.2);
            
            // 2. Kích hoạt giao diện ảnh đôi lãng mạn
            const couplePanel = document.getElementById('couple-interface');
            if (couplePanel) couplePanel.classList.add('active');

            // 3. Cập nhật Panel trạng thái hệ thống
            const voiceText = document.getElementById('voice-text');
            const voiceDot = document.getElementById('voice-dot');
            if (voiceText) voiceText.innerText = "🎉 CHINH ĐÃ ĐỒNG Ý!";
            if (voiceDot) voiceDot.className = "w-2.5 h-2.5 rounded-full bg-green-400 animate-ping";
            
            printLog("Kích hoạt thành công chế độ hạnh phúc!");
        }

        async function initCamera() {
            video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: CONFIG.VIDEO_WIDTH, height: CONFIG.VIDEO_HEIGHT }
            });
            video.srcObject = stream;
            return new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
        }

        function initHandDetector() {
            try {
                hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                hands.onResults(onHandResults);

                const cameraUtils = new Camera(video, {
                    onFrame: async () => { await hands.send({ image: video }); },
                    width: CONFIG.VIDEO_WIDTH, height: CONFIG.VIDEO_HEIGHT
                });
                cameraUtils.start();
            } catch(e) { printLog("Lỗi nạp MediaPipe: " + e.message); }
        }

        function setupClickEvents() {
            const hBurst = document.getElementById('hint-burst');
            const hHeart = document.getElementById('hint-heart');
            const hText = document.getElementById('hint-text');

            if(hHeart) hHeart.addEventListener('click', () => { if(isActivated) return; currentMode = "heart"; highlightHint('hint-heart'); morph(heartPositions, 2.0); });
            if(hBurst) hBurst.addEventListener('click', () => { if(isActivated) return; currentMode = "burst"; highlightHint('hint-burst'); morph(explosionPositions, 1.8); });
            if(hText) hText.addEventListener('click', () => { triggerEngagementEffect(); });
        }

        // XỬ LÝ KHÓA CAMERA: Không cho cử chỉ tay tự mở giao diện
        function onHandResults(results) {
            if (isActivated) return; // Đã chốt thành công -> Khóa toàn bộ cử chỉ tay lại

            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                if(statusDot) statusDot.className = "w-2.5 h-2.5 rounded-full bg-red-500 animate-ping";
                if(statusText) statusText.innerText = "Đang quét bàn tay...";
                return;
            }

            if(statusDot) statusDot.className = "w-2.5 h-2.5 rounded-full bg-green-500";
            if(statusText) statusText.innerText = "Đã tìm thấy bàn tay";

            const landmarks = results.multiHandLandmarks[0];
            const isFingerOpen = (tipIdx, pipIdx) => landmarks[tipIdx].y < landmarks[pipIdx].y;

            const indexOpen  = isFingerOpen(8, 6);
            const middleOpen = isFingerOpen(12, 10);
            const ringOpen   = isFingerOpen(16, 14);
            const pinkyOpen  = isFingerOpen(20, 18);
            
            let openedFingersCount = 0;
            if (indexOpen) openedFingersCount++;
            if (middleOpen) openedFingersCount++;
            if (ringOpen) openedFingersCount++;
            if (pinkyOpen) openedFingersCount++;

            // Chỉ dùng tay để đổi dạng hạt (Xòe tay = Nổ, nắm tay = Trái tim)
            if (openedFingersCount >= 3) {
                if (currentMode !== "burst") {
                    currentMode = "burst";
                    highlightHint('hint-burst');
                    morph(explosionPositions, 1.8);
                }
            } else {
                if (currentMode !== "heart") {
                    currentMode = "heart";
                    highlightHint('hint-heart');
                    morph(heartPositions, 2.0);
                }
            }
        }

        function onWindowResize() {
            let width = window.innerWidth;
            let height = window.innerHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            
            renderer.setSize(width, height);
            composer.setSize(width, height);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (particles) {
                const posAttr = particles.geometry.attributes.position;
                const posArray = posAttr.array;
                const time = Date.now() * 0.002;

                for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                    const idx = i * 3;
                    posArray[idx]   += Math.sin(time + i * 0.1) * 0.005;
                    posArray[idx+1] += Math.cos(time + i * 0.1) * 0.005;
                }
                posAttr.needsUpdate = true;
            }

            composer.render();
        }

        window.onload = init;
    </script>
</body>
</html>
