<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Chinh - Interactive Heart 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #030008; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        #video { position: absolute; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        
        /* Giao diện hiển thị cặp đôi (Match Interface) */
        #couple-interface {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: rgba(10, 2, 18, 0.65);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 20, 147, 0.15);
        }

        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #ff1493;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
            overflow: hidden;
        }
        @media (min-width: 768px) {
            .avatar-container { width: 140px; height: 140px; }
        }

        .heart-center {
            font-size: 2.5rem;
            animation: beat 0.8s infinite alternate cubic-bezier(0.25, 0.8, 0.25, 1);
            filter: drop-shadow(0 0 12px rgba(255, 20, 147, 0.8));
        }

        @keyframes beat {
            from { transform: scale(0.9); }
            to { transform: scale(1.15); }
        }

        .glass-panel {
            background: rgba(12, 3, 20, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 20, 147, 0.25);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Nút trong bảng chọn có hiệu ứng hover mượt mà */
        .btn-hint {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            cursor: pointer;
            pointer-events: auto;
        }
        .btn-hint:hover {
            background: rgba(255, 20, 147, 0.15);
            border-color: rgba(255, 20, 147, 0.3);
            color: #ff1493 !important;
            opacity: 1 !important;
        }

        @media (max-width: 767px) and (orientation: portrait) {
            #canvas-container {
                width: 100vh !important;
                height: 100vw !important;
                transform: rotate(90deg);
                transform-origin: top left;
                top: 0;
                left: 100vw;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <video id="video" playsinline></video>
    
    <div id="loader-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black transition-opacity duration-700">
        <div class="w-12 h-12 border-4 border-pink-500/20 border-l-pink-500 rounded-full animate-spin mb-4"></div>
        <div class="text-pink-500 text-xl font-bold tracking-widest uppercase animate-pulse">Đang đồng bộ thực tế ảo...</div>
    </div>

    <div id="couple-interface" class="fixed inset-0 z-30 flex flex-col items-center justify-center opacity-0 pointer-events-none transform scale-90">
        <div class="p-8 rounded-3xl max-w-md w-11/12 flex flex-col items-center">
            
            <div class="flex items-center justify-center gap-4 md:gap-8 mb-8 relative">
                <div class="avatar-container">
                    <img src="anh_toi.jpg" alt="Bạn" class="w-full h-full object-cover">
                </div>
                
                <div class="heart-center z-10">❤️</div>
                
                <div class="avatar-container">
                    <img src="co_ay.jpg" alt="Chinh" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </div>

    <div class="absolute top-0 left-0 w-full h-full pointer-events-none z-10 p-6 flex flex-col justify-between">
        <div class="glass-panel p-5 w-80 pointer-events-auto">
            <h1 class="text-pink-500 text-xl font-bold mb-1 tracking-wider">COUPLE CORE v12.0</h1>
            <div class="flex items-center gap-2 bg-black/40 rounded-full px-3 py-1 w-fit border border-pink-500/10 mb-4">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500 animate-ping"></div>
                <span id="status-text" class="text-[10px] text-gray-300 font-mono uppercase tracking-wider">Đang chờ bàn tay...</span>
            </div>
            
            <div class="text-[13px] text-pink-200/70 font-mono space-y-2 border-t border-pink-500/10 pt-3">
                <button id="hint-heart" class="btn-hint w-full text-left p-2 rounded-lg flex items-center gap-2 text-white opacity-50">
                    <span>❤️</span> <span><b>Nắm tay:</b> Trái tim hạt cơ bản</span>
                </button>
                <button id="hint-thumb" class="btn-hint w-full text-left p-2 rounded-lg flex items-center gap-2 text-white opacity-50">
                    <span>👍</span> <span><b>Giơ ngón cái:</b> Hiện khung ảnh đôi + Trái tim</span>
                </button>
                <button id="hint-burst" class="btn-hint w-full text-left p-2 rounded-lg flex items-center gap-2 text-white opacity-50">
                    <span>👋</span> <span><b>Xòe 5 ngón:</b> Siêu bùng nổ vũ trụ</span>
                </button>
                <button id="hint-text" class="btn-hint w-full text-left p-2 rounded-lg flex items-center gap-2 text-white opacity-50">
                    <span>🫰</span> <span><b>Bắn tim (2 ngón):</b> Hiện mật mã chữ</span>
                </button>
            </div>
            
            <button id="btn-reset-auto" class="hidden mt-4 w-full py-1.5 rounded-md bg-pink-600/30 border border-pink-500/50 text-[11px] text-pink-400 font-mono uppercase tracking-widest hover:bg-pink-600/50 transition-all pointer-events-auto">
                🔄 Trở về tự động (Camera)
            </button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768;

        const CONFIG = {
            PARTICLE_COUNT: isMobile ? 30000 : 75000, 
            PARTICLE_SIZE: isMobile ? 0.13 : 0.11,   
            COLOR_PINK: 0xff1493,  
            VIDEO_WIDTH: isMobile ? 320 : 640,       
            VIDEO_HEIGHT: isMobile ? 240 : 480,
            DEFAULT_ROTATE_SPEED: 0.6
        };

        let scene, camera, renderer, composer, controls;
        let particles = null;
        let video, hands;
        
        let isManualMode = false; // Flag xác định xem đang click thủ công hay dùng camera
        let currentMode = "heart"; 
        let activeTween = null;

        let heartPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);
        let heartThumbPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);
        let textPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);
        let explosionPositions = new Float32Array(CONFIG.PARTICLE_COUNT * 3);

        async function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030008, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 26); 

            renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false, powerPreference: "high-performance" });
            
            if (isMobile && window.innerHeight > window.innerWidth) {
                renderer.setSize(window.innerHeight, window.innerWidth);
            } else {
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.4, 0.85);
            bloomPass.threshold = 0.0;
            bloomPass.strength = isMobile ? 1.3 : 2.0; 
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = CONFIG.DEFAULT_ROTATE_SPEED;

            precalculateShapes();
            createParticleSystem();
            setupMenuEvents(); // Kích hoạt sự kiện bấm chọn trên bảng điều khiển công cụ

            await initCamera().catch(() => {
                if(document.getElementById('status-text')) document.getElementById('status-text').innerText = "CAMERA BYPASS / CLICK MODE";
            });
            
            initHandDetector();
            window.addEventListener('resize', onWindowResize);
            
            document.getElementById('loader-overlay').style.opacity = '0';
            setTimeout(() => { if(document.getElementById('loader-overlay')) document.getElementById('loader-overlay').remove(); }, 700);

            // Khởi tạo trạng thái sáng mặc định ban đầu cho bảng chọn
            highlightHint(document.getElementById('hint-heart'));

            animate();
        }

        function getFontSegments() {
            return {
                'L': [[0,4, 0,0], [0,0, 2,0]], 'A': [[0,0, 1,4], [1,4, 2,0], [0.3,1.5, 1.7,1.5]],
                'M': [[0,0, 0,4], [0,4, 1,2], [1,2, 2,4], [2,4, 2,0]], 'N': [[0,0, 0,4], [0,4, 2,0], [2,0, 2,4]],
                'G': [[2,3.5, 1,4], [1,4, 0,2], [0,2, 1,0], [1,0, 2,0.5], [2,0.5, 2,2], [2,2, 1.2,2]],
                'U': [[0,4, 0,0.8], [0,0.8, 1,0], [1,0, 2,0.8], [2,0.8, 2,4]], 'O': [[0,0.8, 0,3.2], [0,3.2, 1,4], [1,4, 2,3.2], [2,3.2, 2,0.8], [2,0.8, 1,0], [1,0, 0,0.8]],
                'I': [[0,4, 2,4], [1,4, 1,0], [0,0, 2,0]], 'H': [[0,0, 0,4], [2,0, 2,4], [0,2, 2,2]],
                'E': [[2,4, 0,4], [0,4, 0,0], [0,0, 2,0], [0,2, 1.5,2]], 'C': [[2,3.5, 1,4], [1,4, 0,2], [0,2, 1,0], [1,0, 2,0.5]],
                'Y': [[0,4, 1,2], [2,4, 1,2], [1,2, 1,0]],
            };
        }

        function precalculateShapes() {
            const linesData = [
                { text: "LAM NGUOI YEU", yOffset: 2.5, scale: 1.0 },
                { text: "ANH NHE CHINH", yOffset: -2.5, scale: 1.0 }
            ];

            const fontDefs = getFontSegments();
            let allSegments = [];
            linesData.forEach(lineObj => {
                let currentX = - (lineObj.text.length * 2.5) / 2;
                for (let char of lineObj.text) {
                    if (char === ' ') { currentX += 2.2; continue; }
                    const segs = fontDefs[char];
                    if (segs) {
                        segs.forEach(s => {
                            allSegments.push({
                                x1: currentX + s[0] * lineObj.scale, y1: lineObj.yOffset + s[1] * lineObj.scale,
                                x2: currentX + s[2] * lineObj.scale, y2: lineObj.yOffset + s[3] * lineObj.scale
                            });
                        });
                    }
                    currentX += 2.6;
                }
            });

            for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                const t = Math.PI - 2 * Math.PI * Math.random();
                
                // 1. Trái tim cơ bản
                const rFactor1 = Math.sqrt(Math.random()); 
                let hx1 = 16 * Math.pow(Math.sin(t), 3);
                let hy1 = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const scale1 = 0.75;
                heartPositions[i*3]     = (hx1 * scale1) * rFactor1;
                heartPositions[i*3+1]   = (hy1 * scale1 - 1.0) * rFactor1;
                heartPositions[i*3+2]   = (Math.random() - 0.5) * 2.0;

                // 2. Trái tim rực rỡ mở rộng vòng ngoài
                let hx2 = 16 * Math.pow(Math.sin(t), 3);
                let hy2 = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const scale2 = 1.15; 
                const edgeFactor = 0.9 + Math.random() * 0.1; 
                heartThumbPositions[i*3]   = (hx2 * scale2) * edgeFactor;
                heartThumbPositions[i*3+1] = (hy2 * scale2 - 1.0) * edgeFactor;
                heartThumbPositions[i*3+2] = (Math.random() - 0.5) * 1.0;

                // 3. Mật mã chữ nét mảnh
                if (allSegments.length > 0) {
                    const seg = allSegments[Math.floor(Math.random() * allSegments.length)];
                    const ratio = Math.random();
                    textPositions[i*3]     = seg.x1 + (seg.x2 - seg.x1) * ratio;
                    textPositions[i*3+1]   = seg.y1 + (seg.y2 - seg.y1) * ratio;
                    textPositions[i*3+2]   = (Math.random() - 0.5) * 0.2;
                }

                // 4. Siêu bùng nổ vũ trụ
                explosionPositions[i*3] = heartPositions[i*3] * 3.0;
                explosionPositions[i*3+1] = heartPositions[i*3+1] * 3.0;
                explosionPositions[i*3+2] = heartPositions[i*3+2] * 3.0;
            }
        }

        function createParticleSystem() {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(heartPositions), 3));

            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8,8,0, 8,8,8);
            grad.addColorStop(0, 'rgba(255,255,255,1)');       
            grad.addColorStop(0.2, 'rgba(255,20,147,0.85)');   
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad; ctx.fillRect(0,0,16,16);
            const texture = new THREE.CanvasTexture(canvas);

            const material = new THREE.PointsMaterial({
                size: CONFIG.PARTICLE_SIZE, map: texture, color: new THREE.Color(CONFIG.COLOR_PINK),
                transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function toggleCoupleInterface(show) {
            const ui = document.getElementById('couple-interface');
            if(!ui) return;
            if(show) {
                ui.style.opacity = "1";
                ui.style.transform = "scale(1)";
                ui.style.pointerEvents = "auto";
            } else {
                ui.style.opacity = "0";
                ui.style.transform = "scale(0.9)";
                ui.style.pointerEvents = "none";
            }
        }

        // Logic chuyển dịch mượt mà giữa các hình thể
        function morph(targetPositionsArray, durationTime = 2.0) {
            if (activeTween) activeTween.kill();
            const posAttribute = particles.geometry.attributes.position;
            activeTween = gsap.to(posAttribute.array, {
                endArray: targetPositionsArray, duration: durationTime, ease: "power2.inOut",
                onUpdate: () => { posAttribute.needsUpdate = true; }
            });
        }

        async function initCamera() {
            video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: CONFIG.VIDEO_WIDTH, height: CONFIG.VIDEO_HEIGHT }
            });
            video.srcObject = stream;
            return new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
        }

        function initHandDetector() {
            try {
                hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                hands.onResults(onHandResults);

                const cameraUtils = new Camera(video, {
                    onFrame: async () => { await hands.send({ image: video }); },
                    width: CONFIG.VIDEO_WIDTH, height: CONFIG.VIDEO_HEIGHT
                });
                cameraUtils.start();
            } catch(e) { console.log("MediaPipe Error"); }
        }

        // --- SỰ KIỆN CLICK HOẶC CHẠM POPUP GIAO DIỆN CHỌN TÍNH NĂNG ---
        function setupMenuEvents() {
            const hHeart = document.getElementById('hint-heart');
            const hThumb = document.getElementById('hint-thumb');
            const hBurst = document.getElementById('hint-burst');
            const hText = document.getElementById('hint-text');
            const btnReset = document.getElementById('btn-reset-auto');

            const activateManualMode = (modeName, targetPositions, showInterface, activeElement) => {
                isManualMode = true;
                currentMode = modeName;
                if(btnReset) btnReset.classList.remove('hidden'); // Hiện nút quay về chế độ camera tự động
                
                const statusText = document.getElementById('status-text');
                if(statusText) statusText.innerText = "CHẾ ĐỘ THỦ CÔNG (ĐÃ KHÓA)";

                toggleCoupleInterface(showInterface);
                highlightHint(activeElement);
                morph(targetPositions, 1.8);
            };

            if(hHeart) hHeart.addEventListener('click', () => activateManualMode("heart", heartPositions, false, hHeart));
            if(hThumb) hThumb.addEventListener('click', () => activateManualMode("thumb", heartThumbPositions, true, hThumb));
            if(hBurst) hBurst.addEventListener('click', () => activateManualMode("burst", explosionPositions, false, hBurst));
            if(hText) hText.addEventListener('click', () => activateManualMode("text", textPositions, false, hText));

            // Nút khôi phục lại quyền điều khiển tự động cho Camera cử chỉ
            if(btnReset) {
                btnReset.addEventListener('click', () => {
                    isManualMode = false;
                    btnReset.classList.add('hidden');
                    const statusText = document.getElementById('status-text');
                    if(statusText) statusText.innerText = "Đang chờ bàn tay...";
                });
            }
        }

        // --- XỬ LÝ NHẬN DIỆN CỬ CHỈ QUA CAMERA ---
        function onHandResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                if(!isManualMode) {
                    const statusDot = document.getElementById('status-dot');
                    const statusText = document.getElementById('status-text');
                    if(statusDot) statusDot.className = "w-2 h-2 rounded-full bg-red-500 animate-ping";
                    if(statusText) statusText.innerText = "Đang chờ bàn tay...";
                }
                return;
            }

            if(!isManualMode) {
                const statusDot = document.getElementById('status-dot');
                const statusText = document.getElementById('status-text');
                if(statusDot) statusDot.className = "w-2 h-2 rounded-full bg-green-500";
                if(statusText) statusText.innerText = "Đã khóa mục tiêu tay";
            }

            // Nếu người dùng đang chọn thủ công bằng cách bấm bảng chỉ dẫn, bỏ qua xử lý logic camera dưới đây
            if (isManualMode) return; 

            const landmarks = results.multiHandLandmarks[0];
            const isFingerOpen = (tipIdx, pipIdx) => landmarks[tipIdx].y < landmarks[pipIdx].y;

            const indexOpen  = isFingerOpen(8, 6);
            const middleOpen = isFingerOpen(12, 10);
            const ringOpen   = isFingerOpen(16, 14);
            const pinkyOpen  = isFingerOpen(20, 18);
            
            let openedFingersCount = 0;
            if (indexOpen) openedFingersCount++;
            if (middleOpen) openedFingersCount++;
            if (ringOpen) openedFingersCount++;
            if (pinkyOpen) openedFingersCount++;

            // 1. Cử chỉ Giơ ngón cái (Thumbs up)
            const isThumbsUpPose = (landmarks[4].y < landmarks[2].y) && (landmarks[4].y < landmarks[5].y) && !indexOpen && !middleOpen && !ringOpen && !pinkyOpen;

            // 2. Cử chỉ Bắn tim (Finger heart)
            const distThumbIndex = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);
            const isFingerHeartPose = (distThumbIndex < 0.08) && (landmarks[8].y < landmarks[4].y) && !middleOpen && !ringOpen && !pinkyOpen && !isThumbsUpPose;

            const hHeart = document.getElementById('hint-heart');
            const hThumb = document.getElementById('hint-thumb');
            const hBurst = document.getElementById('hint-burst');
            const hText = document.getElementById('hint-text');

            if (isThumbsUpPose) {
                if (currentMode !== "thumb") {
                    currentMode = "thumb";
                    toggleCoupleInterface(true); 
                    highlightHint(hThumb);
                    morph(heartThumbPositions, 1.8);
                }
            } 
            else if (isFingerHeartPose) {
                if (currentMode !== "text") {
                    currentMode = "text";
                    toggleCoupleInterface(false);
                    highlightHint(hText);
                    morph(textPositions, 2.0);
                }
            } 
            else if (openedFingersCount >= 3) {
                if (currentMode !== "burst") {
                    currentMode = "burst";
                    toggleCoupleInterface(false);
                    highlightHint(hBurst);
                    morph(explosionPositions, 1.6);
                }
            } 
            else {
                if (currentMode !== "heart") {
                    currentMode = "heart";
                    toggleCoupleInterface(false); 
                    highlightHint(hHeart);
                    morph(heartPositions, 2.0);
                }
            }
        }

        function highlightHint(element) {
            if(!element) return;
            resetHints();
            element.style.opacity = "1"; 
            element.style.color = "#ff1493";
            element.style.background = "rgba(255, 20, 147, 0.15)"; 
            element.style.borderColor = "rgba(255, 20, 147, 0.4)";
        }

        function resetHints() {
            ['hint-burst', 'hint-heart', 'hint-text', 'hint-thumb'].forEach(id => {
                const el = document.getElementById(id);
                if(el) { 
                    el.style.opacity = "0.5"; 
                    el.style.color = "white"; 
                    el.style.background = "transparent"; 
                    el.style.borderColor = "transparent"; 
                }
            });
        }

        function onWindowResize() {
            let width = window.innerWidth, height = window.innerHeight;
            if (isMobile && height > width) {
                camera.aspect = height / width; renderer.setSize(height, width); composer.setSize(height, width);
            } else {
                camera.aspect = width / height; renderer.setSize(width, height); composer.setSize(width, height);
            }
            camera.updateProjectionMatrix();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const posAttr = particles.geometry.attributes.position;
            const posArray = posAttr.array;
            const time = Date.now() * 0.002;

            for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                const idx = i * 3;
                posArray[idx]   += Math.sin(time + i * 0.1) * 0.005;
                posArray[idx+1] += Math.cos(time + i * 0.1) * 0.005;
            }
            posAttr.needsUpdate = true;
            composer.render();
        }

        window.onload = init;
    </script>
</body>
</html>
